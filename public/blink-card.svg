<svg xmlns="http://www.w3.org/2000/svg" width="800" height="418" viewBox="0 0 800 418">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="418" fill="url(#bg)" rx="0"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="800" y2="418"/>
    <line x1="200" y1="0" x2="800" y2="300"/>
    <line x1="400" y1="0" x2="800" y2="200"/>
    <line x1="0" y1="100" x2="800" y2="418"/>
    <line x1="0" y1="200" x2="600" y2="418"/>
    <line x1="0" y1="300" x2="400" y2="418"/>
  </g>
  <!-- Glow circles -->
  <circle cx="200" cy="150" r="200" fill="#9333ea" opacity="0.06"/>
  <circle cx="600" cy="300" r="180" fill="#14b8a6" opacity="0.05"/>
  <!-- Ticket emoji area -->
  <text x="400" y="160" text-anchor="middle" font-size="72" fill="#fff" opacity="0.9">🎫</text>
  <!-- Title -->
  <text x="400" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#fff">BlinkTicket</text>
  <!-- Subtitle -->
  <text x="400" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#9ca3af">Event Tickets on Solana</text>
  <!-- Accent line -->
  <rect x="300" y="310" width="200" height="3" rx="2" fill="url(#accent)"/>
  <!-- Badge -->
  <rect x="320" y="340" width="160" height="28" rx="14" fill="#9333ea" opacity="0.15"/>
  <text x="400" y="359" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#c084fc">Powered by Solana</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0720"/>
      <stop offset="100%" style="stop-color:#050a12"/>
    </linearGradient>
    <clipPath id="roundClip">
      <circle cx="240" cy="240" r="240"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="url(#bgGrad)" rx="96"/>

  <!-- Ambient glow -->
  <circle cx="180" cy="200" r="140" fill="#9333ea" opacity="0.08"/>
  <circle cx="300" cy="300" r="120" fill="#14b8a6" opacity="0.06"/>

  <!-- Ticket body - rounded rectangle with notch -->
  <g transform="translate(240,240)" filter="glow">
    <!-- Ticket shape -->
    <rect x="-110" y="-80" width="220" height="160" rx="16" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.9"/>

    <!-- Perforation line (dashed) -->
    <line x1="50" y1="-80" x2="50" y2="80" stroke="url(#grad)" stroke-width="2" stroke-dasharray="6,6" opacity="0.4"/>

    <!-- Notches at perforation -->
    <circle cx="50" cy="-80" r="10" fill="#0a0a14"/>
    <circle cx="50" cy="80" r="10" fill="#0a0a14"/>
    <circle cx="50" cy="-80" r="10" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
    <circle cx="50" cy="80" r="10" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>

    <!-- Lightning bolt - centered in ticket left portion -->
    <g transform="translate(-30, 0)">
      <polygon points="-6,-40 18,-40 4,-6 24,-6 -12,42 -2,6 -22,6" fill="url(#bolt)" filter="glow"/>
    </g>

    <!-- Stub decoration - right side of perforation -->
    <g transform="translate(80, 0)" opacity="0.4">
      <line x1="-10" y1="-20" x2="10" y2="-20" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="-8" x2="10" y2="-8" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="4" x2="10" y2="4" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="22" r="6" fill="none" stroke="url(#grad)" stroke-width="2"/>
    </g>
  </g>
</svg>
